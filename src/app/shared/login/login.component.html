<body>
  <div class="login-container">
    <h2>Sign In</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <input type="text" placeholder="Enter Email or Phone Number" formControlName="username">
      <input type="password" placeholder="Enter Password" formControlName="password">

      <div class="options">
        <a href="#">Resend Verification</a>
        <a href="#">Forgot Password?</a>
      </div>

      <div class="terms">
        By continuing, you agree to the 
        <a href="#">terms of use</a> and 
        <a href="#">privacy policy</a>.
      </div>

      <button type="submit" [disabled]="form.invalid">Sign In</button>
    </form>

    <div class="bottom-text">
      Don't have an account? <a (click)="register()">Register With Us</a>
    </div>
  </div>
</body>
