<mat-toolbar class="main-toolbar">
  <span class="logo" (click)="home()">
    <img src="assets/images/Nedcs logo.png" class="logo-img" />
    <span class="logo-text">READGOOD<span class="blue">BOOKS</span></span>
  </span>

  <span class="spacer"></span>

  <div class="right-section">
    
    <ng-container *ngIf="!isLoggedIn">
      <button mat-button class="sign-in-btn" (click)="login()">
        <mat-icon>login</mat-icon> Sign In
      </button>
    </ng-container>

    <ng-container *ngIf="isLoggedIn">
      <div class="desktop-menu" fxHide.lt-md>
        <ng-container *ngFor="let item of menuItems">
          
          <ng-container *ngIf="item.label === 'My Account'">
            <button mat-button *ngIf="userRole === 2" [matMenuTriggerFor]="accountMenu">
              <mat-icon>{{ item.icon }}</mat-icon> {{ item.label }}
            </button>
            
            <button mat-button *ngIf="userRole !== 2" (click)="item.action()">
              <mat-icon>{{ item.icon }}</mat-icon> {{ item.label }}
            </button>

            <mat-menu #accountMenu="matMenu">
              <button mat-menu-item (click)="goToOrders()">Orders</button>
              <button mat-menu-item (click)="goToAddresses()">Address</button>
              <button mat-menu-item (click)="goToAccount()">Profile</button>
            </mat-menu>
          </ng-container>

          <ng-container *ngIf="item.label !== 'My Account'">
            <button mat-button (click)="item.action()">
              <mat-icon>{{ item.icon }}</mat-icon> {{ item.label }}
            </button>
          </ng-container>

        </ng-container>
      </div>

     <div class="mobile-menu" fxShow.lt-md>
  <button mat-icon-button [matMenuTriggerFor]="mobileMenu">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-menu #mobileMenu="matMenu">
    <ng-container *ngFor="let item of menuItems">
      
      <ng-container *ngIf="item.label === 'My Account' && userRole === 2; else standardMobileItem">
        <button mat-menu-item [matMenuTriggerFor]="mobileAccountMenu">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      </ng-container>

      <ng-template #standardMobileItem>
        <button mat-menu-item (click)="item.action()">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      </ng-template>
      
    </ng-container>
  </mat-menu>

  <mat-menu #mobileAccountMenu="matMenu">
    <button mat-menu-item (click)="goToOrders()">
      <mat-icon>receipt</mat-icon>
      <span>Orders</span>
    </button>
    <button mat-menu-item (click)="goToAddresses()">
      <mat-icon>location_on</mat-icon>
      <span>Address</span>
    </button>
    <button mat-menu-item (click)="goToAccount()">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>
  </mat-menu>
</div>
    </ng-container>
  </div>
</mat-toolbar>
