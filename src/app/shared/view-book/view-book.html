<div class="book-details-page">
  <div class="book-image-container">
    <img [src]="book?.cover_image" [alt]="book?.title" />
  </div>

  <div class="book-info-container">
    <h1>{{ book?.title }}</h1>
    <p class="author">by {{ book?.author_name }}</p>

    <div class="price-section">
      <strong>₹{{ book?.price }}</strong>
    </div>

    <!-- Quantity -->
    <div class="quantity-section">
      <button (click)="decreaseQty()">−</button>
      <span>{{ quantity }}</span>
      <button (click)="increaseQty()">+</button>
    </div>

    <p class="delivery-note">
      ⚠️ ₹100 extra for delivery outside Sikkim (added at checkout)
    </p>

    <p class="total-price">
      Total: ₹{{ book?.price * quantity }}
    </p>

    <button class="place-order" (click)="openCheckoutForm()">
      Buy Now
    </button>

    <hr />

    <h3>About the Book</h3>
    <p>{{ book?.description }}</p>
  </div>
</div>

<!-- ===================== -->
<!-- CHECKOUT + REGISTER -->
<!-- ===================== -->

<div class="checkout-popup" *ngIf="showCheckoutForm">
  <div class="popup-content">
    <h2>Register & Checkout</h2>

    <form (ngSubmit)="registerAndPay()">

      <h3>Personal Details</h3>
      <input required placeholder="First Name" [(ngModel)]="form.first_name" name="first_name" />
      <input required placeholder="Last Name" [(ngModel)]="form.last_name" name="last_name" />
      <input placeholder="Email" [(ngModel)]="form.email" name="email" />
      <input required placeholder="Phone" [(ngModel)]="form.phone_number" name="phone_number" />
      <input required type="password" placeholder="Password" [(ngModel)]="form.password" name="password" />

      <h3>Address</h3>
      <input required placeholder="Address Line 1" [(ngModel)]="form.address_line_1" name="address_line_1" />
      <input placeholder="Address Line 2" [(ngModel)]="form.address_line_2" name="address_line_2" />
      <input placeholder="Landmark" [(ngModel)]="form.landmark" name="landmark" />
      <input required placeholder="City" [(ngModel)]="form.city" name="city" />
      <input required placeholder="Pincode" [(ngModel)]="form.pincode" name="pincode" />

      <!-- STATE SELECT -->
      <select required [(ngModel)]="form.state" name="state">
        <option value="">Select State</option>
        <option *ngFor="let s of states" [value]="s.id">
          {{ s.name }}
        </option>
      </select>

      <button type="submit" class="submit-btn">
        Register & Pay
      </button>

      <button type="button" class="close-btn" (click)="closeCheckoutForm()">
        Cancel
      </button>

    </form>
  </div>
</div>
