<body>
  <div class="login-container">
    <h2>Forgot Password</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <input type="text" placeholder="Email" formControlName="email">
      <input type="text" placeholder="Phone Number" formControlName="phone_number">
      <input type="password" placeholder="New Password" formControlName="new_password">
      <input type="password" placeholder="Confirm Password" formControlName="confirm_password">

      <!-- Validation errors -->
      <div *ngIf="form.errors?.['notMatching']" class="error-message">
        Passwords do not match.
      </div>

      <!-- API or backend errors -->
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

      <button type="submit" [disabled]="form.invalid">Reset Password</button>
    </form>

    <div class="bottom-text">
      Remembered your password? <a (click)="login()">Sign In</a>
    </div>
  </div>
</body>
