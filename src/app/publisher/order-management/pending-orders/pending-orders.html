<div class="order-table-container" *ngIf="orders.length > 0; else noOrders">
  <h3 class="heading">Pending Orders List</h3>

  <table mat-table [dataSource]="orders" class="mat-elevation-z8 full-width-table">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> Order ID </th>
      <td mat-cell *matCellDef="let order"> {{ order.id }} </td>
    </ng-container>

    <!-- Transaction ID Column -->
    <ng-container matColumnDef="transaction_id">
      <th mat-header-cell *matHeaderCellDef> Transaction ID </th>
      <td mat-cell *matCellDef="let order"> {{ order.transaction_id || '—' }} </td>
    </ng-container>

    <!-- Total Amount Column -->
    <ng-container matColumnDef="total_amount">
      <th mat-header-cell *matHeaderCellDef> Total Amount </th>
      <td mat-cell *matCellDef="let order"> {{ order.total_amount }} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let order"> {{ order.status }} </td>
    </ng-container>

    <!-- Order Date Column -->
    <ng-container matColumnDef="order_date">
      <th mat-header-cell *matHeaderCellDef> Order Date </th>
      <td mat-cell *matCellDef="let order"> {{ order.order_date }} </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let order">
        <button mat-icon-button color="primary" (click)="onEdit(order)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<!-- No Orders Fallback -->
<ng-template #noOrders>
  <div class="no-data" style="text-align: center; padding: 50px;">
    <mat-icon style="font-size: 50px; color: #ccc;">hourglass_empty</mat-icon>
    <h3>No Orders Found</h3>
    <p>There are no orders with this status at the moment.</p>
  </div>
</ng-template>
