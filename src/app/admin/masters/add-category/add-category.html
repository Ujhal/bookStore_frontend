<div class="category-form-container">
  <h3 class="heading">Add Category</h3>
  <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="fill" class="full-width form-field">
      <mat-label>Category Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter category name" />
      <mat-error *ngIf="categoryForm.get('name')?.hasError('required')">
        Category Name is required
      </mat-error>
      <mat-error *ngIf="categoryForm.get('name')?.hasError('minlength')">
        Minimum 3 characters required
      </mat-error>
    </mat-form-field>

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="categoryForm.invalid"
    >
      Add Category
    </button>
  </form>
</div>

<!-- Table to display the categories -->
<div class="category-table-container" *ngIf="categories.length > 0">
  <h3 class="heading">Categories List</h3>
  <table mat-table [dataSource]="categories" class="mat-elevation-z8">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let category"> {{ category.id }} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let category"> {{ category.name }} </td>
    </ng-container>

    <!-- Active Column -->
    <ng-container matColumnDef="is_active">
      <th mat-header-cell *matHeaderCellDef> Active </th>
      <td mat-cell *matCellDef="let category">
        <mat-slide-toggle
          [checked]="category.is_active"
          (change)="onToggleStatus(category, $event)"
        >
        </mat-slide-toggle>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
