<div class="book-form-container">
  <h3 class="heading">Add Book</h3>
  <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="Enter book title" />
      <mat-error *ngIf="bookForm.get('title')?.hasError('required')">Title is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Author</mat-label>
      <mat-select formControlName="author">
        <mat-option *ngFor="let a of authors" [value]="a.id">{{ a.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="4" placeholder="Enter description"></textarea>
    </mat-form-field>
    
    <mat-form-field appearance="outline" class="full-width">
  <mat-label>Status</mat-label>
  <mat-select formControlName="status">
    <mat-option value="pending">Pending</mat-option>
    <mat-option value="approved">Approved</mat-option>
    <mat-option value="rejected">Rejected</mat-option>
  </mat-select>
</mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Price</mat-label>
        <input matInput type="number" formControlName="price" placeholder="Enter price" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Currency</mat-label>
        <input matInput formControlName="currency" placeholder="Currency (e.g. INR)" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Stock Quantity</mat-label>
      <input matInput type="number" formControlName="stock_quantity" placeholder="Stock quantity" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Publisher</mat-label>
      <input matInput formControlName="publisher" placeholder="Enter publisher" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Publication Date</mat-label>
      <input matInput [matDatepicker]="pubDatePicker" formControlName="publication_date" />
      <mat-datepicker-toggle matSuffix [for]="pubDatePicker"></mat-datepicker-toggle>
      <mat-datepicker #pubDatePicker></mat-datepicker>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Language</mat-label>
        <input matInput formControlName="language" placeholder="Language code (e.g. en)" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Pages</mat-label>
        <input matInput type="number" formControlName="pages" placeholder="Number of pages" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Subcategory</mat-label>
      <mat-select formControlName="subcategory">
        <mat-option *ngFor="let sc of subcategories" [value]="sc.id">{{ sc.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Slug</mat-label>
      <input matInput formControlName="slug" placeholder="Enter unique slug" />
      <mat-error *ngIf="bookForm.get('slug')?.hasError('required')">Slug is required</mat-error>
    </mat-form-field>

    <!-- Cover image upload -->
    <div class="photo-upload">
      <label for="coverImage" class="file-label">Select Cover Image:</label>
      <input type="file" id="coverImage" (change)="onFileSelected($event)" accept="image/*" />
    </div>

    <button mat-raised-button color="primary" type="submit" [disabled]="bookForm.invalid">
      Add Book
    </button>

  </form>
</div>
