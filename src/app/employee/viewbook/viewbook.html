<div class="book-details-page">
  <div class="book-image-container">
    <img [src]="book?.cover_image" [alt]="book?.title" />
  </div>

  <div class="book-info-container">
    <div class="book-header">
      <h1>{{ book?.title }}</h1>
      <p class="author">by {{ book?.author_name }}</p>
      <p class="category">Category: {{ book?.category_name }}</p>
    </div>

    <div class="price-section">
      <span class="price">Rs. {{ book?.price }}</span>
      <span class="currency">{{ book?.currency }}</span>
      <span class="sale-tag">Sale</span>
    </div>

    <!-- Quantity Section -->
    <div class="quantity-section">
      <label>Quantity</label>
      <div class="quantity-controls">
        <button (click)="decreaseQty()">−</button>
        <span>{{ quantity }}</span>
        <button (click)="increaseQty()">+</button>
      </div>
    </div>

    <!-- Action Buttons -->
  <div class="actions">
  <button class="add-to-cart" (click)="addToCart()">Add to Cart</button>

  <button *ngIf="!showAddressSelector && !isAddressSelected" class="place-order" (click)="openAddressSelector()">Place Your Order</button>
  <button *ngIf="isAddressSelected" class="place-order" (click)="placeOrder()">Confirm Order</button>
</div>

    <!-- Address selector panel / modal -->
    <app-add-address
      *ngIf="showAddressSelector"
      [addresses]="savedAddresses"
      (select)="onAddressSelected($event)"
      (cancel)="cancelAddressSelection()">
    </app-add-address>

    <hr />

    <div class="description">
      <h3>About the Book</h3>
      <p>{{ book?.description }}</p>
    </div>

    <div class="author-info">
      <h3>About the Author</h3>
      <p>{{ book?.author_name }} is a renowned author in the field of {{ book?.subcategory_name }}.</p>
    </div>
  </div>
</div>
